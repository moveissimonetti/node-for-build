name: Publish Docker image

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
    branches:
      - main
      - 'v\d+'
      - 'v\d+\.\d+'
      - 'v\d+\.\d+\.\d+'

jobs:
  setup:
    name: Discover Dockerfiles
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.set_matrix.outputs.matrix }}

    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Find Dockerfiles
        id: set_matrix
        run: |
          matrix_entries="["
          if [ -f "Dockerfile" ]; then
            matrix_entries+="{\"suffix\": \"\", \"dockerfile\": \"Dockerfile\"},"
          fi
          for f in Dockerfile.*; do
            if [ -f "$f" ]; then
              suffix="${f#Dockerfile.}"
              matrix_entries+="{\"suffix\": \"$suffix\", \"dockerfile\": \"$f\"},"
            fi
          done
          matrix_entries="${matrix_entries%,}]"
          echo "matrix=$matrix_entries" >> $GITHUB_OUTPUT

  push_to_registry:
    name: Push Docker image to Docker Hub (${{ matrix.dockerfile }})
    needs:
      - setup

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    uses: ./.github/workflows/docker.tmpl.yaml
    secrets: inherit
    with:
      suffix: ${{ matrix.suffix }}
      dockerfile: ${{ matrix.dockerfile }}
